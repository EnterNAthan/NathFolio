name: Deploy Astro site to Main

on:
  push:
    branches:
      - main  # Exécute l'action uniquement quand il y a un push sur main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

      - name: Build Astro site
        run: npm run build

      - name: Commit and Push built files
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add -A
          git commit -m "🚀 Auto-deploy: Mise à jour du site" || echo "Pas de changement à commit"
          git push origin main
